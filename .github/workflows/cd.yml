name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      matrix:
        include:
          - name: macos-latest
            runs_on: macos-latest
          - name: ubuntu-22.04-arm
            runs_on: ubuntu-22.04-arm
          - name: windows-latest
            runs_on: windows-latest
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Configure git
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@1.90.0

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Upload(Unix)
        if: ${{ runner.os != 'Windows' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          version=$(echo "$GITHUB_SHA" | cut -c 1-9)
          aws s3 cp target/release/moon "s3://${{ secrets.AWS_BUCKET_NAME }}/bleeding-moon/$version/$(uname -s)-$(uname -m)/"
          aws s3 cp target/release/moonrun "s3://${{ secrets.AWS_BUCKET_NAME }}/bleeding-moonrun/$version/$(uname -s)-$(uname -m)/"

      - name: Upload(Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          $version = "$env:GITHUB_SHA".Substring(0, 9)
          aws s3 cp .\target\release\moon.exe "s3://${{ secrets.AWS_BUCKET_NAME }}/bleeding-moon/$version/Windows-x86_64/"
          aws s3 cp .\target\release\moonrun.exe "s3://${{ secrets.AWS_BUCKET_NAME }}/bleeding-moonrun/$version/Windows-x86_64/"

  ubuntu-build:
    runs-on: ubuntu-latest
    env:
      ZIG_VERSION: 0.15.2
      ZIG_GLIBC_VERSION: 2.23
    steps:
      - name: Configure git
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@1.90.0

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Zig version
        run: zig version

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Build with Zig
        run: |
          rustup target add x86_64-unknown-linux-gnu
          cargo zigbuild --release --bin moon --bin moonrun --target x86_64-unknown-linux-gnu.${ZIG_GLIBC_VERSION}

      - name: Verify glibc floor
        run: |
          for bin in target/x86_64-unknown-linux-gnu/release/moon target/x86_64-unknown-linux-gnu/release/moonrun; do
            max_glibc="$(
              readelf -W --version-info "$bin" \
                | awk '/Name: GLIBC_/ { sub(/.*Name: GLIBC_/, "", $0); sub(/ .*/, "", $0); print }' \
                | sort -V \
                | tail -n 1
            )"
            echo "$bin requires GLIBC_${max_glibc}"
            if [ "$(printf '%s\n%s\n' "$max_glibc" "$ZIG_GLIBC_VERSION" | sort -V | tail -n 1)" != "$ZIG_GLIBC_VERSION" ]; then
              echo "GLIBC requirement exceeds ${ZIG_GLIBC_VERSION}"
              exit 1
            fi
          done

      - name: Upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          version=$(echo "$GITHUB_SHA" | cut -c 1-9)
          aws s3 cp target/x86_64-unknown-linux-gnu/release/moon "s3://${{ secrets.AWS_BUCKET_NAME }}/bleeding-moon/$version/Linux-x86_64/"
          aws s3 cp target/x86_64-unknown-linux-gnu/release/moonrun "s3://${{ secrets.AWS_BUCKET_NAME }}/bleeding-moonrun/$version/Linux-x86_64/"
