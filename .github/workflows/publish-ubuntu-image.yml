name: Publish Ubuntu Image

on:
  workflow_call:
    outputs:
      image_ref:
        description: Published GHCR image reference with digest
        value: ${{ jobs.publish-ubuntu-image.outputs.image_ref }}
  workflow_dispatch:

jobs:
  publish-ubuntu-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.export.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image reference
        id: image
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/${owner}/moon-release-build"
          {
            echo "image_name=${image}"
            echo "tags<<EOF"
            echo "${image}:sha-${GITHUB_SHA::12}"
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "${image}:ubuntu-16.04"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Ubuntu release image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ubuntu16.dockerfile
          push: true
          provenance: false
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image reference
        id: export
        run: echo "image_ref=${{ steps.image.outputs.image_name }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"
